name: Up-Nepa Osun - Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor
        run: |
          npm install \
            @capacitor/core@6 \
            @capacitor/cli@6 \
            @capacitor/android@6 \
            @capacitor/app@6 \
            @capacitor/browser@6 \
            @capacitor/status-bar@6

      - name: Create capacitor.config.json
        run: |
          cat > capacitor.config.json << 'CAPEOF'
          {
            "appId": "com.upnepa.osun",
            "appName": "Up-Nepa Osun",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https",
              "hostname": "up-nepa-osun.vercel.app"
            }
          }
          CAPEOF

      - name: Add Android Platform
        run: npx cap add android || true

      - name: Sync Web Assets to Android
        run: npx cap sync android

      # -------------------------------------------------------
      # FIX 1: App Name
      # Override the default Capacitor app label in strings.xml
      # so the installed APK shows "Up-Nepa Osun" as app name.
      # -------------------------------------------------------
      - name: Set App Name in strings.xml
        run: |
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          if [ -f "$STRINGS_FILE" ]; then
            sed -i 's|<string name="app_name">.*</string>|<string name="app_name">Up-Nepa Osun</string>|g' "$STRINGS_FILE"
          else
            mkdir -p android/app/src/main/res/values
            cat > "$STRINGS_FILE" << 'STREOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Up-Nepa Osun</string>
              <string name="title_activity_main">Up-Nepa Osun</string>
              <string name="package_name">com.upnepa.osun</string>
              <string name="custom_url_scheme">com.upnepa.osun</string>
          </resources>
          STREOF
          fi

      # -------------------------------------------------------
      # FIX 2: App Icon
      # Copy icon.png from www/ into ALL required Android
      # mipmap density folders so it shows on every device.
      # -------------------------------------------------------
      - name: Apply App Icon from www/icon.png
        run: |
          ICON_SRC="www/icon.png"

          if [ ! -f "$ICON_SRC" ]; then
            echo "ERROR: www/icon.png not found. Please add your icon to the www folder."
            exit 1
          fi

          # Install imagemagick for resizing
          sudo apt-get install -y imagemagick

          # Android mipmap folder sizes
          declare -A SIZES
          SIZES["mdpi"]=48
          SIZES["hdpi"]=72
          SIZES["xhdpi"]=96
          SIZES["xxhdpi"]=144
          SIZES["xxxhdpi"]=192

          for DENSITY in "${!SIZES[@]}"; do
            SIZE="${SIZES[$DENSITY]}"
            DEST_DIR="android/app/src/main/res/mipmap-${DENSITY}"
            mkdir -p "$DEST_DIR"

            # ic_launcher (standard icon)
            convert "$ICON_SRC" -resize "${SIZE}x${SIZE}" "$DEST_DIR/ic_launcher.png"

            # ic_launcher_round (circular icon for modern Android)
            convert "$ICON_SRC" \
              -resize "${SIZE}x${SIZE}" \
              \( +clone -threshold 101% +level-colors white,black \
                 -virtual-pixel none -distort SRT 0 \
                 -alpha off -threshold 50% \) \
              -compose CopyOpacity -composite \
              -gravity center \
              "$DEST_DIR/ic_launcher_round.png"
          done

          # Also place in legacy drawable folder
          mkdir -p android/app/src/main/res/drawable
          convert "$ICON_SRC" -resize "192x192" android/app/src/main/res/drawable/ic_launcher.png

          echo "✅ Icons applied to all densities."

      # -------------------------------------------------------
      # FIX 3: Rename output APK to "Up-Nepa-Osun"
      # Gradle outputs "app-debug.apk" by default.
      # We rename it so the download is clearly labeled.
      # -------------------------------------------------------
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/Up-Nepa-Osun.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-APK
          path: android/app/build/outputs/apk/debug/Up-Nepa-Osun.apk
          retention-days: 14
