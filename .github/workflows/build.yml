name: Build Up-Nepa Osun APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor App plugin for deep links
        run: npm install @capacitor/app

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        run: npx cap add android 2>/dev/null || echo "Already exists"

      - name: Copy web assets
        run: npx cap copy android

      - name: Sync Capacitor plugins
        run: npx cap sync android

      - name: Fix app name in strings.xml
        run: |
          DIR="android/app/src/main/res/values"
          mkdir -p "$DIR"
          FILE="$DIR/strings.xml"
          if [ -f "$FILE" ]; then
            sed -i 's|<string name="app_name">.*</string>|<string name="app_name">Up-Nepa Osun</string>|g' "$FILE"
            sed -i 's|<string name="title_activity_main">.*</string>|<string name="title_activity_main">Up-Nepa Osun</string>|g' "$FILE"
          else
            printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <string name="app_name">Up-Nepa Osun</string>\n    <string name="title_activity_main">Up-Nepa Osun</string>\n    <string name="package_name">com.upnepa.osun</string>\n    <string name="custom_url_scheme">com.upnepa.osun</string>\n</resources>\n' > "$FILE"
          fi
          echo "strings.xml:"
          cat "$FILE"

      - name: Add deep link intent filter to AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if grep -q "login-callback" "$MANIFEST"; then
            echo "Deep link already present"
          else
            sed -i 's|</activity>|        <intent-filter>\n            <action android:name="android.intent.action.VIEW"/>\n            <category android:name="android.intent.category.DEFAULT"/>\n            <category android:name="android.intent.category.BROWSABLE"/>\n            <data android:scheme="com.upnepa.osun" android:host="login-callback"/>\n        </intent-filter>\n    </activity>|' "$MANIFEST"
            echo "Deep link intent filter added"
          fi
          echo "Manifest:"
          cat "$MANIFEST"

      - name: Set icon background color
        run: |
          DIR="android/app/src/main/res/values"
          mkdir -p "$DIR"
          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <color name="ic_launcher_background">#07080F</color>\n</resources>\n' > "$DIR/ic_launcher_background.xml"

      - name: Fix adaptive icon XML
        run: |
          DIR="android/app/src/main/res/mipmap-anydpi-v26"
          mkdir -p "$DIR"
          printf '<?xml version="1.0" encoding="utf-8"?>\n<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">\n    <background android:drawable="@color/ic_launcher_background"/>\n    <foreground android:drawable="@mipmap/ic_launcher_foreground"/>\n</adaptive-icon>\n' > "$DIR/ic_launcher.xml"
          cp "$DIR/ic_launcher.xml" "$DIR/ic_launcher_round.xml"
          echo "Adaptive icon XML fixed"

      - name: Install sharp
        run: npm install sharp --save-dev

      - name: Generate icons from www/icon.png
        run: |
          node -e "
          var sharp=require('sharp');
          var fs=require('fs');
          var path=require('path');
          var src='www/icon.png';
          if(!fs.existsSync(src)){console.log('No www/icon.png');process.exit(0);}
          var base='android/app/src/main/res';
          var sizes=[{d:'mipmap-mdpi',s:48},{d:'mipmap-hdpi',s:72},{d:'mipmap-xhdpi',s:96},{d:'mipmap-xxhdpi',s:144},{d:'mipmap-xxxhdpi',s:192}];
          function next(i){
            if(i>=sizes.length){console.log('All icons done!');return;}
            var item=sizes[i];
            var dir=path.join(base,item.d);
            fs.mkdirSync(dir,{recursive:true});
            sharp(src).resize(item.s,item.s,{fit:'cover'}).png().toFile(path.join(dir,'ic_launcher.png')).then(function(){
              return sharp(src).resize(item.s,item.s,{fit:'cover'}).png().toFile(path.join(dir,'ic_launcher_round.png'));
            }).then(function(){
              return sharp(src).resize(item.s,item.s,{fit:'contain',background:{r:7,g:8,b:15,alpha:1}}).png().toFile(path.join(dir,'ic_launcher_foreground.png'));
            }).then(function(){console.log('Done '+item.d);next(i+1);}).catch(function(e){console.error(e);process.exit(1);});
          }
          next(0);
          "

      - name: Verify icons exist
        run: |
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            F="android/app/src/main/res/mipmap-$d/ic_launcher.png"
            if [ -f "$F" ]; then echo "OK $d"; else echo "MISSING $d"; fi
          done

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UpNepaOsun-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show result
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK" ]; then echo "SUCCESS:"; ls -lh "$APK"; else echo "FAILED"; exit 1; fi
