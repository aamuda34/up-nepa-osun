name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Files and Build APK
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # FIX: Create the 'www' folder Capacitor is looking for
          mkdir -p www
          
          # Copy your HTML, JSON, and assets into the 'www' folder safely
          rsync -av --exclude='www' --exclude='.git' --exclude='.github' --exclude='node_modules' ./ www/
          
          # Initialize Capacitor pointing specifically to the new 'www' folder
          npx cap init "Up-Nepa Osun" "com.upnepa.osun" --web-dir www
          
          # Add Android and sync (This will now succeed without the ENOENT error)
          npx cap add android
          npx cap sync android
          
          # Build the APK natively
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
        env:
          CI: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Release
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
