name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Branded APK
        run: |
          # 1. Install branding tools
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          
          # 2. FIX: Move the icon from www to the ROOT so the tool can find it
          if [ -f "www/icon.png" ]; then
            cp www/icon.png ./icon.png
          fi

          # 3. Force the unique name in the config
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.upnepa.osun",
            "appName": "Up-Nepa Osun",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          EOF
          
          # 4. Generate ALL Android icons and splashes
          # This replaces the blue 'X' with your unique icon
          npx @capacitor/assets generate --android
          
          # 5. Build and Sync
          rm -rf android
          npx cap add android
          
          # Copy google-services if it exists
          if [ -f "www/google-services.json" ]; then
            cp www/google-services.json android/app/
          fi
          
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
          # Rename for the final download
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Up-Nepa-Osun.apk
        env:
          CI: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Branded
          path: android/app/build/outputs/apk/debug/Up-Nepa-Osun.apk
          
