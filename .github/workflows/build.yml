name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/android @capacitor/assets @capacitor/core @capacitor/cli --save-dev

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Capacitor Setup & Icon Generation
        run: |
          # 1. Initialize Capacitor with your specific App Name and ID
          npx cap init "Up-Nepa Osun Elite" "com.aamuda.app" --web-dir www

          # 2. Add the Android platform (this fixes the 'platform not added' error)
          npx cap add android

          # 3. Sync everything
          npx cap sync android
          
          # 4. Generate the purple lightning icons from your icon.png
          # Ensure your icon is saved as 'www/icon.png'
          npx @capacitor/assets generate --android --iconSource www/icon.png

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Elite-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
