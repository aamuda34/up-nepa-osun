name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/android @capacitor/assets @capacitor/core @capacitor/cli --save-dev

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Prepare Web Assets
        run: |
          # Create the directory Capacitor requires
          mkdir -p www
          # Search for any .html files and copy them to www
          # If index.html exists, it becomes the primary entry point
          find . -maxdepth 1 -name "*.html" -exec cp {} www/ \;
          # Ensure an icon exists for the build process
          cp icon.png www/ 2>/dev/null || touch www/icon.png

      - name: Initialize and Add Android
        run: |
          # 1. Initialize with the unique package name
          npx cap init "Up-Nepa Osun" "com.aamuda.upnepa.osun" --web-dir www

          # 2. Add the Android platform
          npx cap add android
          
          # 3. Generate icons
          if [ -f "icon.png" ]; then
            npx @capacitor/assets generate --android
          fi
          
          # 4. Sync ensures the unique name is written to the Android Manifest
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          # Force the use of JDK 21 to prevent the 'invalid source release' error
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME_21_X64

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Elite-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
