name: Build Up-Nepa Osun APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 芒鈥濃偓芒鈥濃偓 1. CHECKOUT 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
      - name: Checkout repository
        uses: actions/checkout@v4

      # 芒鈥濃偓芒鈥濃偓 2. NODE 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install npm dependencies
        run: npm install

      # 芒鈥濃偓芒鈥濃偓 3. JAVA & ANDROID SDK 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 芒鈥濃偓芒鈥濃偓 4. CAPACITOR 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add Android platform (safe if already exists)
        run: npx cap add android 2>/dev/null || echo "Android platform already exists, continuing..."

      - name: Copy web assets to Android
        run: npx cap copy android

      - name: Sync Capacitor plugins
        run: npx cap sync android

      # 芒鈥濃偓芒鈥濃偓 5. FIX APP NAME 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
      - name: Set correct app name in strings.xml
        run: |
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          mkdir -p "android/app/src/main/res/values"
          if [ -f "$STRINGS_FILE" ]; then
            sed -i 's|<string name="app_name">.*</string>|<string name="app_name">Up-Nepa Osun</string>|g' "$STRINGS_FILE"
            echo "App name updated:"
            cat "$STRINGS_FILE"
          else
            cat > "$STRINGS_FILE" << 'EOF'
<?xml version='1.0' encoding='utf-8'?>
<resources>
    <string name="app_name">Up-Nepa Osun</string>
    <string name="title_activity_main">Up-Nepa Osun</string>
    <string name="package_name">com.upnepa.osun</string>
    <string name="custom_url_scheme">com.upnepa.osun</string>
</resources>
EOF
            echo "strings.xml created"
          fi

      # 芒鈥濃偓芒鈥濃偓 6. GENERATE CUSTOM ICONS 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
      - name: Install sharp for icon resizing
        run: npm install sharp --save-dev

      - name: Generate all Android icon sizes from www/icon.png
        run: |
          node << 'SCRIPT'
          const sharp = require('sharp');
          const fs = require('fs');
          const path = require('path');

          const src = 'www/icon.png';
          if (!fs.existsSync(src)) {
            console.log('www/icon.png not found - skipping');
            process.exit(0);
          }

          const base = 'android/app/src/main/res';
          const sizes = [
            { dir: 'mipmap-mdpi',    size: 48  },
            { dir: 'mipmap-hdpi',    size: 72  },
            { dir: 'mipmap-xhdpi',   size: 96  },
            { dir: 'mipmap-xxhdpi',  size: 144 },
            { dir: 'mipmap-xxxhdpi', size: 192 },
          ];

          async function run() {
            for (const s of sizes) {
              const outDir = path.join(base, s.dir);
              fs.mkdirSync(outDir, { recursive: true });
              await sharp(src).resize(s.size, s.size, { fit: 'cover' }).png()
                .toFile(path.join(outDir, 'ic_launcher.png'));
              await sharp(src).resize(s.size, s.size, { fit: 'cover' }).png()
                .toFile(path.join(outDir, 'ic_launcher_round.png'));
              await sharp(src).resize(s.size, s.size, { fit: 'contain', background: { r:7, g:8, b:15, alpha:1 } }).png()
                .toFile(path.join(outDir, 'ic_launcher_foreground.png'));
              console.log('Generated mipmap-' + s.dir + ' at ' + s.size + 'px');
            }
            console.log('All icons generated!');
          }
          run().catch(e => { console.error(e); process.exit(1); });
          SCRIPT

      - name: Fix adaptive icon XMLs and background color
        run: |
          ANYDPI="android/app/src/main/res/mipmap-anydpi-v26"
          mkdir -p "$ANYDPI"
          cat > "$ANYDPI/ic_launcher.xml" << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
    <background android:drawable="@color/ic_launcher_background"/>
    <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
</adaptive-icon>
EOF
          cat > "$ANYDPI/ic_launcher_round.xml" << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
    <background android:drawable="@color/ic_launcher_background"/>
    <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
</adaptive-icon>
EOF
          cat > "android/app/src/main/res/values/ic_launcher_background.xml" << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <color name="ic_launcher_background">#07080F</color>
</resources>
EOF
          echo "Adaptive icons and background color set"

      # 芒鈥濃偓芒鈥濃偓 7. BUILD APK 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      # 芒鈥濃偓芒鈥濃偓 8. UPLOAD APK 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UpNepaOsun-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show result
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK" ]; then
            echo "SUCCESS - APK built:"
            ls -lh "$APK"
          else
            echo "FAILED - APK not found"
            exit 1
          fi
