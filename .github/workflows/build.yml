name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fix Unique Icon and Build
        run: |
          # 1. Install branding tools
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          
          # 2. Setup folder and config
          mkdir -p www
          rsync -av --exclude='www' --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude='android' ./ www/
          
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.upnepa.osun",
            "appName": "Up-Nepa Osun",
            "webDir": "www"
          }
          EOF
          
          # 3. Create Android platform FIRST
          npx cap add android
          
          # 4. GENERATE ICON (Injecting into the android folder we just made)
          # We use your icon.png located in the www folder
          npx @capacitor/assets generate --android --iconSource www/icon.png
          
          # 5. Move google-services.json to the correct internal path
          if [ -f "www/google-services.json" ]; then
            cp www/google-services.json android/app/
          fi
          
          # 6. Final Sync and Build
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Up-Nepa-Osun.apk
        env:
          CI: true

      - name: Upload Final Branded APK
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Branded
          path: android/app/build/outputs/apk/debug/Up-Nepa-Osun.apk
          
