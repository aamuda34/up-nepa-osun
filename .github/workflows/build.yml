    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/assets @capacitor/cli @capacitor/core @capacitor/android --legacy-peer-deps

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Prepare Web Directory
        run: |
          # Create the www folder if it doesn't exist
          mkdir -p www
          # Copy your index.html and icon.png into it so Capacitor can find them
          cp index.html www/ 2>/dev/null || echo "index.html not in root"
          cp icon.png www/ 2>/dev/null || echo "icon.png not in root"
          # Ensure an index.html exists so sync doesn't crash
          if [ ! -f "www/index.html" ]; then echo "<html><body>Elite App</body></html>" > www/index.html; fi

      - name: Capacitor Sync & Assets
        run: |
          # If android folder doesn't exist, add it
          if [ ! -d "android" ]; then npx cap add android; fi
          npx cap sync android
          
          # Generate icons from the icon in the www folder
          if [ -f "www/icon.png" ]; then
            npx @capacitor/assets generate --android --iconSource www/icon.png
          else
            echo "Warning: icon.png not found, using default icons"
          fi

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Elite-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
