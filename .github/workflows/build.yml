name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Branded APK with Deep Linking
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets@latest
          
          # Setup Icon Assets
          mkdir -p assets
          cp www/icon.png assets/icon-only.png
          cp www/icon.png assets/icon-foreground.png
          cp www/icon.png assets/icon-background.png
          
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.upnepa.osun",
            "appName": "Up-Nepa Osun",
            "webDir": "www"
          }
          EOF
          
          npx cap add android
          npx capacitor-assets generate --android
          
          # --- THE FIX: INJECT DEEP LINK SUPPORT ---
          # This tells Android to jump back to the app after browser login
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<intent-filter>/i \
            <intent-filter>\
                <action android:name="android.intent.action.VIEW" />\
                <category android:name="android.intent.category.DEFAULT" />\
                <category android:name="android.intent.category.BROWSABLE" />\
                <data android:scheme="com.upnepa.osun" />\
            </intent-filter>' $MANIFEST

          if [ -f "www/google-services.json" ]; then
            cp www/google-services.json android/app/
          fi
          
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Up-Nepa-Osun.apk
        env:
          CI: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Fixed-Auth
          path: android/app/build/outputs/apk/debug/Up-Nepa-Osun.apk
