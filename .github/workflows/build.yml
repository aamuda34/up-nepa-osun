name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    # Using a specialized container prevents all interactive hangs
    container: node:20-bullseye 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          apt-get update && apt-get install -y openjdk-17-jdk-headless
          npm install -g @bubblewrap/cli

      - name: Generate APK
        run: |
          # The --confirm flag forces Bubblewrap to stop asking questions
          bubblewrap build --skipSigning --confirm
        env:
          # Automatically tells the builder where Java is located
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Final
          path: ./*.apk
          
