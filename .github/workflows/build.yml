name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Branded APK
        run: |
          # 1. Install necessary branding tools
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          
          # 2. Structure web files
          mkdir -p www
          rsync -av --exclude='www' --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude='android' ./ www/
          
          # 3. FIX: Create the config at the ROOT (Sets the "Up-Nepa Osun" name)
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.upnepa.osun",
            "appName": "Up-Nepa Osun",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          EOF
          
          # 4. FIX: Correct Icon Generation (Fixes the unknown option error)
          # The tool automatically looks for icons in an "assets" folder
          mkdir -p assets
          if [ -f "www/icon.png" ]; then
            cp www/icon.png assets/icon.png
          fi
          npx @capacitor/assets generate --android
          
          # 5. Fresh Platform Setup
          rm -rf android
          npx cap add android
          
          # 6. Fix Firebase Location
          if [ -f "www/google-services.json" ]; then
            cp www/google-services.json android/app/
          fi
          
          # 7. Final Sync and Compile
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
          # Rename output for a professional look
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Up-Nepa-Osun.apk
        env:
          CI: true

      - name: Upload Branded APK
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Branded
          path: android/app/build/outputs/apk/debug/Up-Nepa-Osun.apk
          
