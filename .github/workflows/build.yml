name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/android @capacitor/assets @capacitor/core @capacitor/cli --save-dev

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Prepare Web Assets
        run: |
          # 1. Create the 'www' folder Capacitor requires
          mkdir -p www
          # 2. Copy your HTML and precious icon into it
          cp index.html www/ 2>/dev/null || cp *.html www/ 2>/dev/null || true
          cp icon.png www/ 2>/dev/null || cp icon.png . 2>/dev/null || true

      - name: Initialize and Add Android
        run: |
          # 1. Force initialize with your Unique Name
          npx cap init "Up-Nepa Osun Elite" "com.aamuda.upnepa.osun" --web-dir www

          # 2. Add and Sync the Android platform
          npx cap add android
          
          # 3. Generate your precious Purple Lightning icon
          if [ -f "icon.png" ]; then
            npx @capacitor/assets generate --android --assetPath .
          fi

          # 4. FORCE the App Name into the Android manifest and strings
          # This ensures it says "Up-Nepa Osun Elite" on your home screen
          sed -i 's/app_name">.*</app_name">Up-Nepa Osun Elite</g' android/app/src/main/res/values/strings.xml
          
          # 5. Final sync to lock everything in
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          # Force Gradle to use Java 21 to match the source release
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME_21_X64

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Elite-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
