name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/android @capacitor/assets @capacitor/core @capacitor/cli --save-dev

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Initialize and Add Android
        run: |
          # 1. Initialize with the updated Unique Name and App Name
          npx cap init "Up-Nepa Osun" "com.aamuda.upnepa.osun" --web-dir .

          # 2. Add and Sync the Android platform
          npx cap add android
          npx cap sync android
          
          # 3. Generate the launcher icons
          if [ -f "icon.png" ]; then
            npx @capacitor/assets generate --android --assetPath .
          else
            echo "Error: icon.png not found!"
            exit 1
          fi

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          # Force Gradle to use Java 21 for this build
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME_21_X64

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
