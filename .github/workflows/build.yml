name: Build Up-Nepa Osun APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor and plugins
        run: |
          npm install \
            @capacitor/core@6 \
            @capacitor/cli@6 \
            @capacitor/android@6 \
            @capacitor/app@6 \
            @capacitor/browser@6 \
            @capacitor/status-bar@6 \
            @capacitor/local-notifications@6 \
            --save-exact

      - name: Write capacitor.config.json
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.upnepa.osun",
            "appName": "Up-Nepa Osun",
            "webDir": "www",
            "androidScheme": "https",
            "plugins": {
              "LocalNotifications": {
                "smallIcon": "ic_launcher",
                "iconColor": "#C084FC",
                "sound": "light_alert.wav"
              }
            }
          }
          EOF

      - name: Write service worker
        run: |
          cat > www/sw.js << 'EOF'
          self.addEventListener('install', function(e){ self.skipWaiting(); });
          self.addEventListener('activate', function(e){ e.waitUntil(clients.claim()); });
          self.addEventListener('push', function(e){
            var data={};
            try{ data=e.data?e.data.json():{}; }catch(err){}
            e.waitUntil(self.registration.showNotification(data.title||'Up-Nepa Osun',{
              body: data.body||'Power status updated!',
              icon: '/www/icon.png',
              badge: '/www/icon.png',
              vibrate: [200,100,200]
            }));
          });
          self.addEventListener('notificationclick', function(e){
            e.notification.close();
            e.waitUntil(clients.matchAll({type:'window',includeUncontrolled:true}).then(function(list){
              for(var i=0;i<list.length;i++){ if('focus' in list[i]) return list[i].focus(); }
              if(clients.openWindow) return clients.openWindow('/');
            }));
          });
          EOF

      - name: Install Pillow
        run: pip install Pillow --break-system-packages

      - name: Generate light alert sound (WAV)
        run: |
          python3 << 'PYEOF'
          import struct, math, wave, os
          RATE = 44100
          AMP  = 28000

          def tone(freq, dur, fade_ms=20):
              n = int(RATE * dur)
              fn = int(RATE * fade_ms / 1000)
              out = []
              for i in range(n):
                  v = int(AMP * math.sin(2 * math.pi * freq * i / RATE))
                  if i < fn:   v = int(v * i / fn)
                  elif i > n-fn: v = int(v * (n-i) / fn)
                  out.append(v)
              return out

          def silence(dur):
              return [0] * int(RATE * dur)

          samples = tone(880,0.18) + tone(1109,0.18) + silence(0.07) + tone(880,0.14) + tone(1318,0.22)
          os.makedirs('www', exist_ok=True)
          with wave.open('www/light_alert.wav','w') as wf:
              wf.setnchannels(1); wf.setsampwidth(2); wf.setframerate(RATE)
              wf.writeframes(struct.pack('<'+'h'*len(samples), *samples))
          print('light_alert.wav created:', os.path.getsize('www/light_alert.wav'), 'bytes')
          PYEOF

      - name: Init and sync Capacitor
        run: |
          npx cap add android
          npx cap sync android

      - name: Set app name
        run: |
          cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Up-Nepa Osun</string>
              <string name="title_activity_main">Up-Nepa Osun</string>
              <string name="package_name">com.upnepa.osun</string>
              <string name="custom_url_scheme">com.upnepa.osun</string>
          </resources>
          EOF

      - name: Generate all icon sizes from www/icon.png
        run: |
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw
          import os

          src = 'www/icon.png'
          img = Image.open(src).convert('RGBA') if os.path.exists(src) else Image.new('RGBA',(1024,1024),(192,132,252,255))
          base = 'android/app/src/main/res'

          # (density, launcher_px, foreground_px)
          sizes = [('mdpi',48,108),('hdpi',72,162),('xhdpi',96,216),('xxhdpi',144,324),('xxxhdpi',192,432)]

          for density, sz, fsz in sizes:
              folder = os.path.join(base, f'mipmap-{density}')
              os.makedirs(folder, exist_ok=True)

              # ic_launcher.png
              icon = img.resize((sz, sz), Image.LANCZOS)
              bg = Image.new('RGB', (sz, sz), (7, 8, 15))
              if icon.mode == 'RGBA':
                  bg.paste(icon, mask=icon.split()[3])
              else:
                  bg.paste(icon)
              bg.save(os.path.join(folder, 'ic_launcher.png'))

              # ic_launcher_round.png
              round_img = img.resize((sz, sz), Image.LANCZOS)
              mask = Image.new('L', (sz, sz), 0)
              draw = ImageDraw.Draw(mask)
              draw.ellipse([0, 0, sz, sz], fill=255)
              bg2 = Image.new('RGB', (sz, sz), (7, 8, 15))
              if round_img.mode == 'RGBA':
                  bg2.paste(round_img, mask=round_img.split()[3])
              else:
                  bg2.paste(round_img)
              result = Image.new('RGB', (sz, sz), (7, 8, 15))
              result.paste(bg2, mask=mask)
              result.save(os.path.join(folder, 'ic_launcher_round.png'))

              # ic_launcher_foreground.png
              canvas = Image.new('RGBA', (fsz, fsz), (0, 0, 0, 0))
              pad = int(fsz * 0.125)
              inner_sz = fsz - pad * 2
              inner = img.resize((inner_sz, inner_sz), Image.LANCZOS)
              if inner.mode == 'RGBA':
                  canvas.paste(inner, (pad, pad), mask=inner.split()[3])
              else:
                  canvas.paste(inner, (pad, pad))
              canvas.save(os.path.join(folder, 'ic_launcher_foreground.png'))

              print(f'{density}: {sz}px done')

          print('All icons generated.')
          PYEOF

      - name: Write adaptive icon XML (Android 8+)
        run: |
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/ic_launcher_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#07080F</color>
          </resources>
          EOF

      - name: Generate splash screens
        run: |
          python3 << 'PYEOF'
          from PIL import Image
          import os

          src = 'www/icon.png'
          if not os.path.exists(src):
              print('No icon.png, skipping splash'); exit(0)

          img = Image.open(src).convert('RGBA')
          splashes = [
              ('drawable',720,1280),('drawable-port-hdpi',480,800),
              ('drawable-land-hdpi',800,480),('drawable-xxhdpi',960,1600),
              ('drawable-xxxhdpi',1280,1920),
          ]
          for folder, w, h in splashes:
              path = f'android/app/src/main/res/{folder}'
              os.makedirs(path, exist_ok=True)
              splash = Image.new('RGB', (w, h), (7, 8, 15))
              icon_sz = min(w, h) // 3
              icon = img.resize((icon_sz, icon_sz), Image.LANCZOS)
              x = (w - icon_sz) // 2
              y = (h - icon_sz) // 2
              if icon.mode == 'RGBA':
                  splash.paste(icon, (x, y), mask=icon.split()[3])
              else:
                  splash.paste(icon, (x, y))
              splash.save(os.path.join(path, 'splash.png'))
              print(f'{folder}: {w}x{h}')
          print('Splash screens done.')
          PYEOF

      - name: Inject deep link and notification permissions
        run: |
          python3 << 'PYEOF'
          import re

          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r') as f:
              content = f.read()

          # Add deep link
          deep_link = '''
                  <intent-filter android:autoVerify="true">
                      <action android:name="android.intent.action.VIEW" />
                      <category android:name="android.intent.category.DEFAULT" />
                      <category android:name="android.intent.category.BROWSABLE" />
                      <data android:scheme="com.upnepa.osun" android:host="login-callback" />
                  </intent-filter>'''
          if 'login-callback' not in content:
              content = content.replace('</activity>', deep_link + '\n        </activity>', 1)

          # Add permissions
          permissions = [
              '<uses-permission android:name="android.permission.VIBRATE" />',
              '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />',
              '<uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />',
          ]
          for perm in permissions:
              pname = re.search(r'android:name="([^"]+)"', perm).group(1)
              if pname not in content:
                  content = content.replace('<application', perm + '\n    <application', 1)

          with open(path, 'w') as f:
              f.write(content)
          print('Manifest updated.')
          PYEOF

      - name: Copy sound to Android raw resources
        run: |
          mkdir -p android/app/src/main/res/raw
          cp www/light_alert.wav android/app/src/main/res/raw/light_alert.wav
          echo "Sound copied."

      - name: Copy google-services.json
        run: |
          if [ -f www/google-services.json ]; then
            cp www/google-services.json android/app/google-services.json
            echo "google-services.json copied."
          else
            echo "No google-services.json found â€” skipping."
          fi

      - name: Configure Gradle
        run: |
          cat >> android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
          org.gradle.parallel=true
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename and upload APK
        run: |
          APK=$(find android -name "*.apk" | head -1)
          if [ -z "$APK" ]; then echo "ERROR: No APK found!"; exit 1; fi
          cp "$APK" Up-Nepa-Osun.apk
          echo "APK ready: $(du -sh Up-Nepa-Osun.apk | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-APK
          path: Up-Nepa-Osun.apk
          retention-days: 14
