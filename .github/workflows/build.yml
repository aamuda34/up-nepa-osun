name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Capacitor & Tools
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # This creates the missing Android factory files
          npx cap init "Up Nepa Osun" "com.upnepa.osun" --web-dir www
          npx cap add android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Final APK
        run: |
          npx cap sync
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Elite-APK
          path: android/app/build/outputs/apk/release/*.apk
          
