name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Prevents Node 20 deprecation failures

      - name: Install Dependencies
        run: |
          # --legacy-peer-deps fixes the ERESOLVE error seen in your logs
          # --no-package-lock prevents the 254 error when the lock file is missing
          npm install --legacy-peer-deps --no-package-lock
          npm install @capacitor/android @capacitor/core @capacitor/cli --legacy-peer-deps

      - name: Create Web Assets
        run: |
          # Capacitor requires a www folder to sync successfully
          mkdir -p www
          cp index.html www/index.html || true
          npm run build --if-present

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Capacitor Sync
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
