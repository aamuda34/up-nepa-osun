name: Build Android APK Final Fix

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Branded APK
        run: |
          # Use specific v6 versions to prevent the ERESOLVE error
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6 @capacitor/app@6 @capacitor/browser@6 @capacitor/status-bar@6
          
          # Continue with assets and build
          mkdir -p assets
          if [ -f "www/icon.png" ]; then
            cp www/icon.png assets/icon-only.png
            cp www/icon.png assets/icon-foreground.png
            cp www/icon.png assets/icon-background.png
          fi

          # Create Capacitor Config
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.upnepa.osun",
            "appName": "Up-Nepa Osun",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https",
              "hostname": "up-nepa-osun.vercel.app"
            }
          }
          EOF

          npx cap add android
          npx cap sync android
          cd android && ./gradlew assembleDebug
          
