name: Build Android APK Final Fix

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Branded APK
        run: |
          # 1. Fresh Project Init
          npm init -y
          
          # 2. INSTALLATION (This is where legacy-peer-deps belongs)
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6 @capacitor/app@6 @capacitor/assets@latest --legacy-peer-deps
          
          # 3. Assets Preparation
          mkdir -p assets
          if [ -f "www/icon.png" ]; then
            cp www/icon.png assets/icon-only.png
            cp www/icon.png assets/icon-foreground.png
            cp www/icon.png assets/icon-background.png
          fi
          
          # 4. Capacitor Config
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.upnepa.osun",
            "appName": "Up-Nepa Osun",
            "webDir": "www"
          }
          EOF
          
          # 5. Native Project Generation
          npx cap add android
          if [ -d "assets" ]; then
            npx capacitor-assets generate --android || true
          fi
          
          # 6. LOGIN FIX: Intent Filter Injection
          # This tells Android to return to your app after the Google account is selected
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          DEEP_LINK='<intent-filter android:label="browsable"><action android:name="android.intent.action.VIEW" /><category android:name="android.intent.category.DEFAULT" /><category android:name="android.intent.category.BROWSABLE" /><data android:scheme="com.upnepa.osun" /></intent-filter>'
          sed -i "/<\/activity>/i $DEEP_LINK" $MANIFEST

          # 7. Sync Assets
          npx cap sync android
          
          # 8. Compile APK
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Up-Nepa-Osun-Final.apk
        env:
          CI: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Final-APK
          path: android/app/build/outputs/apk/debug/Up-Nepa-Osun-Final.apk
          
