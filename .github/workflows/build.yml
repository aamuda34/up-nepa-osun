name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Upgrades from deprecated Node 20

      - name: Install Dependencies
        run: |
          # --legacy-peer-deps bypasses the ERESOLVE errors
          # --no-package-lock prevents failures when package-lock.json is missing
          npm install --legacy-peer-deps --no-package-lock
          npm install @capacitor/android @capacitor/core @capacitor/cli --legacy-peer-deps

      - name: Create Web Assets
        run: |
          # Capacitor needs a 'www' folder to sync; this ensures it exists
          mkdir -p www
          # If your build command fails, it creates a fallback index.html
          npm run build --if-present || echo "<html><body>Fallback</body></html>" > www/index.html

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Capacitor Sync
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
