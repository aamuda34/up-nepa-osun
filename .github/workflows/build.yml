name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Branded APK
        run: |
          # 1. Setup required structure
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # We use a specific version of assets to avoid "unknown option" errors
          npm install @capacitor/assets@latest
          
          mkdir -p assets
          cp www/icon.png assets/icon-only.png
          cp www/icon.png assets/icon-foreground.png
          cp www/icon.png assets/icon-background.png
          
          # 2. Create standard config
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.upnepa.osun",
            "appName": "Up-Nepa Osun",
            "webDir": "www"
          }
          EOF
          
          # 3. Add platform and GENERATE
          npx cap add android
          
          # Using the command that matches the latest Capacitor Assets version
          npx capacitor-assets generate --android
          
          # 4. Inject Firebase
          if [ -f "www/google-services.json" ]; then
            cp www/google-services.json android/app/
          fi
          
          # 5. Build Final
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Up-Nepa-Osun.apk
        env:
          CI: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Final
          path: android/app/build/outputs/apk/debug/Up-Nepa-Osun.apk
          
