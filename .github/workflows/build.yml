name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Workspace and Build
        run: |
          # 1. Setup Capacitor Environment
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          
          # 2. Structure web files
          mkdir -p www
          rsync -av --exclude='www' --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude='android' ./ www/
          
          # 3. Initialize with your Unique Name and App ID
          npx cap init "Up-Nepa Osun" "com.upnepa.osun" --web-dir www
          
          # 4. Add Android platform
          npx cap add android
          
          # 5. GENERATE ICON (Make sure 'icon.png' exists in your main folder)
          if [ -f "icon.png" ]; then
            npx capacitor-assets generate --android
          fi
          
          # 6. Final Sync and Build
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
        env:
          CI: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Release
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
