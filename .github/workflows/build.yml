name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/android @capacitor/assets @capacitor/core @capacitor/cli --save-dev

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          cp index.html www/ 2>/dev/null || cp *.html www/
          cp icon.png www/ 2>/dev/null || true

      - name: Initialize and Add Android
        run: |
          # 1. Force the new unique name during initialization
          npx cap init "Up-Nepa Osun" "com.aamuda.upnepa.osun" --web-dir www

          # 2. Add the platform
          npx cap add android
          
          # 3. Generate icons using the correct current syntax
          if [ -f "icon.png" ]; then
            npx @capacitor/assets generate --android
          fi
          
          # 4. Critical: Sync ensures the unique name is written to AndroidManifest.xml
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          # Ensure Gradle uses Java 21 to match your source release
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME_21_X64

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Elite-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
