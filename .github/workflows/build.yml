name: Up-Nepa Osun - Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor
        run: |
          npm install \
            @capacitor/core@6 \
            @capacitor/cli@6 \
            @capacitor/android@6 \
            @capacitor/app@6 \
            @capacitor/browser@6 \
            @capacitor/status-bar@6

      # â”€â”€ Write capacitor.config.json at ROOT (Capacitor requires it here)
      - name: Create capacitor.config.json
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.upnepa.osun",
            "appName": "Up-Nepa Osun",
            "webDir": "www",
            "server": {
              "androidScheme": "https",
              "hostname": "up-nepa-osun.vercel.app"
            },
            "plugins": {
              "App": {
                "launchUrl": "com.upnepa.osun://login-callback"
              }
            }
          }
          EOF

      - name: Add Android Platform
        run: npx cap add android || true

      - name: Sync Web Assets to Android
        run: npx cap sync android

      # â”€â”€ FIX: App Name â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # Capacitor sometimes overrides strings.xml with default name.
      # We overwrite it directly after sync.
      - name: Set App Name
        run: |
          FILE="android/app/src/main/res/values/strings.xml"
          mkdir -p "$(dirname $FILE)"
          cat > "$FILE" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Up-Nepa Osun</string>
              <string name="title_activity_main">Up-Nepa Osun</string>
              <string name="package_name">com.upnepa.osun</string>
              <string name="custom_url_scheme">com.upnepa.osun</string>
          </resources>
          EOF

      # â”€â”€ FIX: App Icon â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # Uses Python Pillow (pre-installed on GitHub runners).
      # Resizes www/icon.png into every required Android mipmap
      # density. No ImageMagick needed â€” Pillow is more reliable on CI.
      - name: Install Pillow
        run: pip install Pillow --quiet

      - name: Apply App Icon to all mipmap folders
        run: |
          python3 << 'PYEOF'
          from PIL import Image
          import os, sys

          src = "www/icon.png"
          if not os.path.exists(src):
              print(f"ERROR: {src} not found!")
              sys.exit(1)

          # Open and convert to RGBA so transparency is handled
          img = Image.open(src).convert("RGBA")
          print(f"Source icon: {img.size[0]}x{img.size[1]}px")

          densities = {
              "mdpi":    48,
              "hdpi":    72,
              "xhdpi":   96,
              "xxhdpi":  144,
              "xxxhdpi": 192,
          }

          for density, size in densities.items():
              folder = f"android/app/src/main/res/mipmap-{density}"
              os.makedirs(folder, exist_ok=True)

              resized = img.resize((size, size), Image.LANCZOS)

              # Standard launcher icon
              resized.save(f"{folder}/ic_launcher.png", "PNG")

              # Round launcher icon (Android clips to circle automatically)
              resized.save(f"{folder}/ic_launcher_round.png", "PNG")

              # Foreground layer (for adaptive icons)
              resized.save(f"{folder}/ic_launcher_foreground.png", "PNG")

              print(f"  {density}: {size}x{size}px -> {folder}")

          # Legacy drawable fallback
          os.makedirs("android/app/src/main/res/drawable", exist_ok=True)
          img.resize((192, 192), Image.LANCZOS).save(
              "android/app/src/main/res/drawable/ic_launcher.png", "PNG"
          )

          print("All icons written successfully.")
          PYEOF

      # â”€â”€ FIX: Adaptive Icon XML â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # Modern Android (8+) uses adaptive icons defined in XML.
      # Without this file, some devices ignore the mipmap PNGs.
      - name: Create Adaptive Icon XML
        run: |
          MIPMAP_DIR="android/app/src/main/res/mipmap-anydpi-v26"
          mkdir -p "$MIPMAP_DIR"

          cat > "$MIPMAP_DIR/ic_launcher.xml" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

          cat > "$MIPMAP_DIR/ic_launcher_round.xml" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

          # Background color for adaptive icon (dark to match app theme)
          VALUES_DIR="android/app/src/main/res/values"
          mkdir -p "$VALUES_DIR"

          # Add background color (only if not already in colors.xml)
          cat > "$VALUES_DIR/ic_launcher_background.xml" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#07080D</color>
          </resources>
          EOF

          echo "Adaptive icon XML created."

      # â”€â”€ FIX: Deep Link Intent Filter â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # Injects com.upnepa.osun://login-callback into AndroidManifest
      # so Google OAuth redirects back to the app after login.
      - name: Inject Deep Link Intent Filter
        run: |
          python3 << 'PYEOF'
          import os

          path = "android/app/src/main/AndroidManifest.xml"
          if not os.path.exists(path):
              print("AndroidManifest.xml not found!")
              exit(1)

          with open(path, "r") as f:
              content = f.read()

          if "com.upnepa.osun" in content:
              print("Deep link already present. Skipping.")
              exit(0)

          intent_filter = """
                  <intent-filter android:label="Up-Nepa Osun Login">
                      <action android:name="android.intent.action.VIEW" />
                      <category android:name="android.intent.category.DEFAULT" />
                      <category android:name="android.intent.category.BROWSABLE" />
                      <data
                          android:scheme="com.upnepa.osun"
                          android:host="login-callback" />
                  </intent-filter>"""

          content = content.replace("</activity>", intent_filter + "\n        </activity>", 1)

          with open(path, "w") as f:
              f.write(content)

          print("Deep link intent filter injected.")
          PYEOF

      # â”€â”€ Copy google-services.json â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Copy google-services.json
        run: |
          if [ -f "www/google-services.json" ]; then
            cp www/google-services.json android/app/google-services.json
            echo "google-services.json copied."
          else
            echo "WARNING: www/google-services.json not found."
          fi

      # â”€â”€ BUILD â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/Up-Nepa-Osun.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-APK
          path: android/app/build/outputs/apk/debug/Up-Nepa-Osun.apk
          retention-days: 14
