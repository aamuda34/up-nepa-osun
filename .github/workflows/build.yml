name: Build Up-Nepa Osun APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Initialize App Engine (Capacitor)
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Up-Nepa Osun" com.upnepa.osun --web-dir .
          npx cap add android
          
      - name: Link Firebase Bridge
        run: |
          cp google-services.json android/app/ || echo "Waiting for google-services.json"

      - name: Set up Java Builder
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Compile Android APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Final APK
        uses: actions/upload-artifact@v3
        with:
          name: Up-Nepa-Osun-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
