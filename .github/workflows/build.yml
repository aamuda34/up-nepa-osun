name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/android @capacitor/assets @capacitor/core @capacitor/cli --save-dev

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Initialize and Add Android
        run: |
          # 1. Initialize the project with your Elite name
          npx cap init "Up-Nepa Osun Elite" "com.aamuda.app" --web-dir www

          # 2. Add and Sync the Android platform
          npx cap add android
          npx cap sync android
          
          # 3. Generate the launcher icons (The Purple Lightning)
          # We point it to the 'www' folder where your icon.png lives
          if [ -f "www/icon.png" ]; then
            npx @capacitor/assets generate --android --assetPath www
          else
            echo "Error: www/icon.png not found in the repository!"
            exit 1
          fi

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Elite-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
