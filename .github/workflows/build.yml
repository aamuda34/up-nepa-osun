name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # This uses a pre-made Android environment so we don't hit SDK errors
      - name: Build with Mobile-First Action
        uses: gear-app/github-action-html-to-apk@v1
        with:
          app-name: "Up-Nepa Osun"
          url: "https://up-nepa-osun-1491a.firebaseapp.com"
          icon-path: "./icon.png" # Make sure you have an icon.png or remove this line

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-APK
          path: ./*.apk
          
