name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Force Install Dependencies
        run: |
          npm install --legacy-peer-deps --no-package-lock
          npm install @capacitor/android @capacitor/core @capacitor/cli --legacy-peer-deps

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Capacitor Init and Sync
        run: |
          # Create web folder
          mkdir -p www
          if [ ! -f "www/index.html" ]; then echo "<html><body>Ready</body></html>" > www/index.html; fi
          
          # Initialize Capacitor if config is missing (using a placeholder ID and Name)
          if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ]; then
            npx cap init "MyTrackingApp" "com.aamuda.app" --web-dir www
          fi

          # Add and Sync Android
          npx cap add android || true
          npx cap sync android

      - name: Build Android APK
        run: |
          if [ -d "android" ]; then
            cd android
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            echo "Sync failed - android folder missing"
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
