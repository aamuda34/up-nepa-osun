name: Build Android APK
on:
  push:
    branches:
      - main  # Or whichever branch you are using

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Instead of the broken action, we use a reliable web-to-apk tool
      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK from Web Files
        run: |
          # This packages your index.html into a professional TWA (APK)
          # Note: Replace with your actual site URL if hosted, 
          # or use a local build command.
          bubblewrap build --skipSigning

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ./*.apk
          
