name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build APK
        run: |
          npm install -g @bubblewrap/cli
          # This tells Bubblewrap exactly where the Java we just installed is located
          export JAVA_HOME=$JAVA_HOME
          
          # We use 'yes n' because it should NOT install its own JDK, it should use ours
          yes n | bubblewrap build --skipSigning || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Final
          path: ./*.apk
          
