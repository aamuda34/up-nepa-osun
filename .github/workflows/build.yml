    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          # This tool is required to turn your icon.png into Android icons
          npm install @capacitor/assets --save-dev

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Capacitor Sync & Icon Generation
        run: |
          # 1. Sync the web code to the Android folder
          npx cap sync android
          
          # 2. Generate the actual Android icons from your icon.png
          # This ensures the purple lightning logo shows on the phone home screen
          npx @capacitor/assets generate --android --iconSource www/icon.png

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Elite-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
