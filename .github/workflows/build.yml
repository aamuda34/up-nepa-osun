name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Bypasses Node 20 deprecation

      - name: Install Dependencies
        run: |
          # Use --no-package-lock because your repo is missing the file
          npm install --no-package-lock 
          npm install @capacitor/android @capacitor/core @capacitor/cli

      - name: Create Build Assets
        run: |
          mkdir -p www
          cp index.html www/index.html || true 
          npm run build --if-present

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Capacitor Sync
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
