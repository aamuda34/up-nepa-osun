name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/android @capacitor/assets @capacitor/core @capacitor/cli --save-dev

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Initialize and Add Android
        run: |
          # 1. Create the config with the correct Elite name and ID
          npx cap init "Up-Nepa Osun Elite" "com.aamuda.app" --web-dir www

          # 2. Add the android folder (This fixes the 'not added yet' error)
          npx cap add android

          # 3. Sync the web files to the android folder
          npx cap sync android
          
          # 4. Generate the purple lightning icons from your icon.png
          # Make sure icon.png is inside your 'www' folder
          if [ -f "www/icon.png" ]; then
            npx @capacitor/assets generate --android --iconSource www/icon.png
          else
            echo "Warning: www/icon.png not found. Skipping icon generation."
          fi

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Elite-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
