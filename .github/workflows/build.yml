name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK (Direct Method)
        run: |
          npm install -g @bubblewrap/cli
          # We force the web directory to the current folder correctly
          yes | bubblewrap init --manifest="https://up-nepa-osun-1491a.firebaseapp.com/manifest.json"
          yes | bubblewrap build --skipSigning
        env:
          CI: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-APK
          path: ./*.apk
          
