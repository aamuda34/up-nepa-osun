name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build APK (Stable Method)
        run: |
          npm install -g @ionic/cli @capacitor/core @capacitor/cli
          # This converts your web app into a native Android project automatically
          npm install
          npx cap init "Up-Nepa Osun" "com.upnepa.osun" --web-dir .
          npx cap add android
          npx cap copy
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
