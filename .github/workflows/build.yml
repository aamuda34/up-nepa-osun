name: Build Android APK Final Fix

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Branded APK
        run: |
          # Clean install and force specific v6 versions
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6 @capacitor/app@6 @capacitor/browser@6 @capacitor/status-bar@6
          
          # Prepare assets
          mkdir -p assets
          if [ -f "www/icon.png" ]; then
            cp www/icon.png assets/icon-only.png
            cp www/icon.png assets/icon-foreground.png
            cp www/icon.png assets/icon-background.png
          fi

          # Create Capacitor Config dynamically
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.upnepa.osun",
            "appName": "Up-Nepa Osun",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https",
              "hostname": "up-nepa-osun.vercel.app"
            }
          }
          EOF

          # Sync and Build Android project
          npx cap add android || true
          npx cap sync android
          cd android && ./gradlew assembleDebug

      - name: Upload APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Standalone-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          
