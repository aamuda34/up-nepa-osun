name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build APK
        run: |
          npm install -g @bubblewrap/cli
          # Use 'yes' to handle all prompts and build into the current directory
          yes | bubblewrap build --skipSigning

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-APK
          # We search everywhere in the folder for any .apk file
          path: "**/*.apk"
          if-no-files-found: error
          
