name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # CRITICAL: We have removed 'cache: npm' entirely. 
          # This stops the "Dependencies lock file is not found" error.

      - name: Force Install Dependencies
        run: |
          # --no-package-lock: Tells npm not to look for or create a lock file
          # --legacy-peer-deps: Fixes the ERESOLVE version conflict errors
          npm install --legacy-peer-deps --no-package-lock
          npm install @capacitor/android @capacitor/core @capacitor/cli --legacy-peer-deps

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Capacitor Sync
        run: |
          # Ensure the web folder exists before syncing
          mkdir -p www
          if [ ! -f "www/index.html" ]; then echo "<html></html>" > www/index.html; fi
          
          npx cap add android || true
          npx cap sync android

      - name: Build Android APK
        run: |
          if [ -d "android" ]; then
            cd android
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            echo "Android folder missing - Capacitor Sync failed."
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
