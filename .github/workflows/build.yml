name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Explicitly use Node 22 to stop deprecation errors

      - name: Install Dependencies
        run: |
          # The --no-package-lock flag stops the build from crashing if the file is missing
          npm install --no-package-lock
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Web Assets
        run: |
          # Ensures the required directory exists for Capacitor
          mkdir -p www
          npm run build --if-present

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Android Capacitor Sync
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
