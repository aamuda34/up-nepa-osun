name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/android @capacitor/assets @capacitor/core @capacitor/cli --save-dev

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Prepare Web Assets
        run: |
          # Create the directory
          mkdir -p www
          # List files to debug (visible in your GitHub logs)
          ls -R
          # Copy whatever html file exists to www/index.html
          find . -maxdepth 1 -name "*.html" -exec cp {} www/index.html \;
          # Copy icon if it exists
          cp icon.png www/ 2>/dev/null || true

      - name: Initialize and Add Android
        run: |
          # 1. Initialize using 'www'
          npx cap init "Up-Nepa Osun" "com.aamuda.upnepa.osun" --web-dir www

          # 2. Add and Sync
          npx cap add android
          npx cap sync android
          
          # 3. Generate icons from the root icon.png
          if [ -f "icon.png" ]; then
            npx @capacitor/assets generate --android --assetPath .
          fi

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME_21_X64

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Elite-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
