name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # CRITICAL: Ensure there is NO 'cache: npm' line here.
          # If that line exists, the build will fail because you don't have a lock file.

      - name: Debug - List Files
        run: ls -R # This helps us see if package.json and the android folder are actually there

      - name: Install Dependencies
        run: |
          # If package.json is missing, this will fail. 
          # We use --no-package-lock to prevent the runner from looking for one.
          npm install --legacy-peer-deps --no-package-lock --no-audit
          npm install @capacitor/android @capacitor/core @capacitor/cli --legacy-peer-deps

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Capacitor Sync
        run: |
          mkdir -p www
          # Create a dummy index if one isn't found to prevent Capacitor sync failure
          if [ ! -f "www/index.html" ]; then echo "<html></html>" > www/index.html; fi
          
          npx cap add android || true
          npx cap sync android

      - name: Build Android APK
        run: |
          if [ -d "android" ]; then
            cd android
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            echo "ERROR: Android folder not found. Capacitor Sync likely failed."
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
