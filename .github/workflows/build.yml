name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Branded APK
        run: |
          # 1. Install branding and build tools
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          
          # 2. Fix the Name & Directory Config
          # This forces "Up-Nepa Osun" as the name and "www" as the web source
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.upnepa.osun",
            "appName": "Up-Nepa Osun",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          EOF
          
          # 3. Fix the Icon Branding (Standard Way)
          # The tool looks for an 'assets' folder, so we create it
          mkdir -p assets
          cp www/icon.png assets/icon.png
          # Run generator (no extra flags needed now)
          npx @capacitor/assets generate --android
          
          # 4. Clean Build of Android Platform
          rm -rf android
          npx cap add android
          
          # 5. Connect Firebase
          if [ -f "www/google-services.json" ]; then
            cp www/google-services.json android/app/
          fi
          
          # 6. Build the APK
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
          # Rename output for professional download
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Up-Nepa-Osun.apk
        env:
          CI: true

      - name: Upload Branded APK
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Branded
          path: android/app/build/outputs/apk/debug/Up-Nepa-Osun.apk
          
