name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to manually trigger the build

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build APK with Capacitor
        run: |
          # 1. Initialize a basic package.json silently
          npm init -y
          
          # 2. Install Capacitor locally to avoid broken pipes and missing repos
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # 3. Initialize the app using your current directory as the web root
          npx cap init "Up-Nepa Osun" "com.upnepa.osun" --web-dir .
          
          # 4. Add Android and sync files
          npx cap add android
          npx cap sync android
          
          # 5. Build the APK using GitHub's native, pre-configured Android tools
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
        env:
          CI: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Release
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
