name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Force Custom Icon Injection
        run: |
          # 1. Install standard tools
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          
          # 2. Setup the required structure for the asset tool
          mkdir -p resources
          cp www/icon.png resources/icon.png
          
          # 3. Create config
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.upnepa.osun",
            "appName": "Up-Nepa Osun",
            "webDir": "www"
          }
          EOF
          
          # 4. Initialize Android
          npx cap add android
          
          # 5. THE CRITICAL FIX: Generate and OVERWRITE all default icons
          # This forces the tool to replace every blue logo with your icon.png
          npx @capacitor/assets generate --android --iconSource resources/icon.png
          
          # 6. Move firebase config
          if [ -f "www/google-services.json" ]; then
            cp www/google-services.json android/app/
          fi
          
          # 7. Build
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Up-Nepa-Osun.apk
        env:
          CI: true

      - name: Upload Final Branded APK
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Professional
          path: android/app/build/outputs/apk/debug/Up-Nepa-Osun.apk
          
