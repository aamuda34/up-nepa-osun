name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK (Automated)
        run: |
          # We use 'yes' to bypass the manual JDK installation prompt seen in your log
          yes | bubblewrap init --manifest=https://up-nepa-osun.vercel.app/manifest.json
          bubblewrap build --skipSigning --yes

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Release
          path: ./*.apk
          
