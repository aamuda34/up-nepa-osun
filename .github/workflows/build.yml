name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      # This is a community action that wraps your HTML into an APK
      - name: Build APK
        uses: jasonraimondi/html-to-apk-action@v1
        with:
          app-name: "Up-Nepa Osun"
          app-id: "com.upnepa.osun"
          url: "https://your-website-url.com" # Use your live link or a placeholder
          
