name: Build Android APK
on:
  push:
    branches: [ "main" ]

# Force the runner to use Node 24 as suggested by the GitHub warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Note: No 'cache' line here. This prevents the "Lock file not found" error.

      - name: Install Dependencies
        run: |
          # Clean install without checking for a lock file
          npm install --legacy-peer-deps --no-package-lock
          npm install @capacitor/android @capacitor/core @capacitor/cli --legacy-peer-deps

      - name: Create Required Folders
        run: |
          # Capacitor will fail if these aren't ready
          mkdir -p www
          if [ ! -f "www/index.html" ]; then
            echo "<html><body>Fallback</body></html>" > www/index.html
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Capacitor Sync
        run: |
          # Force add and sync even if folders already exist
          npx cap add android || true
          npx cap sync android

      - name: Build Android APK
        run: |
          # Ensure gradlew is executable before running
          if [ -d "android" ]; then
            cd android
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            echo "Android folder not found. Check if Capacitor Sync worked."
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
