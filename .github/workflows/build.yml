name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/android @capacitor/assets @capacitor/core @capacitor/cli --save-dev

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Prepare Web Assets
        run: |
          # Create the required directory
          mkdir -p www
          # Move all HTML and your precious icon into the build folder
          find . -maxdepth 1 -name "*.html" -exec cp {} www/ \;
          cp icon.png www/ 2>/dev/null || true

      - name: Initialize and Add Android
        run: |
          # 1. Initialize with the exact Unique ID and Precious Name
          npx cap init "Up-Nepa Osun Elite" "com.aamuda.upnepa.osun" --web-dir www

          # 2. Add and Sync the platform
          npx cap add android
          npx cap sync android
          
          # 3. Apply your precious Purple Lightning icon
          if [ -f "icon.png" ]; then
            npx @capacitor/assets generate --android --assetPath .
          fi

          # 4. FORCE the App Name into the Android strings file
          # This ensures "Up-Nepa Osun Elite" appears on the phone screen
          sed -i 's/app_name">.*</app_name">Up-Nepa Osun Elite</g' android/app/src/main/res/values/strings.xml

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          # Force Java 21 to avoid the 'invalid source release' error from your logs
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME_21_X64

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          # This names the ZIP file you download from GitHub
          name: Up-Nepa-Osun-Elite-Debug
          # This identifies the actual .apk file inside the ZIP
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
