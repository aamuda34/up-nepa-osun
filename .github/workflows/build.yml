name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Branded APK with Custom Icon
        run: |
          # 1. Install necessary branding tools
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          
          # 2. Setup the config at the ROOT
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.upnepa.osun",
            "appName": "Up-Nepa Osun",
            "webDir": "www"
          }
          EOF
          
          # 3. Fresh Platform Setup
          rm -rf android
          npx cap add android
          
          # 4. GENERATE ICON (Must run AFTER 'cap add android')
          # This specifically targets your file in the www folder and overwrites the default logos
          if [ -f "www/icon.png" ]; then
            npx @capacitor/assets generate --android --iconSource www/icon.png
          fi
          
          # 5. Move google-services.json to the required Android location
          if [ -f "www/google-services.json" ]; then
            cp www/google-services.json android/app/
          fi
          
          # 6. Final Sync and Compile
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
          # Rename for the final download
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Up-Nepa-Osun.apk
        env:
          CI: true

      - name: Upload Branded APK
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Branded
          path: android/app/build/outputs/apk/debug/Up-Nepa-Osun.apk
          
