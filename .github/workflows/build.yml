      - name: Build Branded APK with Deep Links
        run: |
          # 1. Initialize and force install compatible versions
          npm init -y
          # Using --legacy-peer-deps to bypass version conflicts once and for all
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest @capacitor/app@latest @capacitor/assets@latest --legacy-peer-deps
          
          # 2. Asset Setup
          mkdir -p assets
          if [ -f "www/icon.png" ]; then
            cp www/icon.png assets/icon-only.png
            cp www/icon.png assets/icon-foreground.png
            cp www/icon.png assets/icon-background.png
          fi
          
          # 3. Create Config
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.upnepa.osun",
            "appName": "Up-Nepa Osun",
            "webDir": "www"
          }
          EOF
          
          # 4. Add Android Platform
          npx cap add android
          
          # 5. Generate Icons
          if [ -d "assets" ]; then
            npx capacitor-assets generate --android || true
          fi
          
          # 6. Deep Link Injection (Modified for high reliability)
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          DEEP_LINK='<intent-filter android:label="browsable"><action android:name="android.intent.action.VIEW" /><category android:name="android.intent.category.DEFAULT" /><category android:name="android.intent.category.BROWSABLE" /><data android:scheme="com.upnepa.osun" /></intent-filter>'
          
          # Ensure we place it inside the Activity tag correctly
          sed -i "/<\/activity>/i $DEEP_LINK" $MANIFEST

          # 7. Google Services
          if [ -f "www/google-services.json" ]; then
            cp www/google-services.json android/app/
          fi
          
          # 8. Final Sync and Gradle Build
          npx cap sync android --legacy-peer-deps
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Up-Nepa-Osun-Final.apk
        env:
          CI: true
          
