name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/android @capacitor/assets @capacitor/core @capacitor/cli --save-dev

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          find . -maxdepth 1 -name "*.html" -exec cp {} www/ \;
          cp icon.png www/ 2>/dev/null || true

      - name: Initialize and Add Android
        run: |
          # 1. Initialize with the Unique ID and the Elite Name
          npx cap init "Up-Nepa Osun Elite" "com.aamuda.upnepa.osun" --web-dir www

          # 2. Add the platform and sync
          npx cap add android
          npx cap sync android
          
          # 3. Apply your precious Purple Lightning icon
          if [ -f "icon.png" ]; then
            npx @capacitor/assets generate --android --assetPath .
          fi

          # 4. CRITICAL: Force the App Name into the Android system strings
          # This ensures "Up-Nepa Osun Elite" shows on the phone screen
          sed -i 's/app_name">.*</app_name">Up-Nepa Osun Elite</g' android/app/src/main/res/values/strings.xml

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          # Force the build to use Java 21 to prevent the 'invalid source release' error
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME_21_X64

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Up-Nepa-Osun-Elite-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
