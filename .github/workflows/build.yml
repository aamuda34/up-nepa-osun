name: Build Android APK
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Initialize and Build
        run: |
          # Create a basic manifest so it doesn't prompt for 'y/n'
          bubblewrap init --manifest="https://your-site-url.com/manifest.json" --no-prompt
          bubblewrap build --skipSigning
        env:
          # This prevents the CLI from hanging on questions
          CI: true 

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ./*.apk
