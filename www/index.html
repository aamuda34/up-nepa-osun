<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Up-Nepa Osun Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0a0a0b; color: #fdfdfd; padding: 16px; padding-bottom: 80px; }
        
        #notif-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #bb86fc; color: #000; padding: 14px 20px; border-radius: 12px; font-weight: 800; z-index: 10000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.8); width: 90%; text-align: center; border: 2px solid #fff; }

        .header-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .member-count { background: rgba(187, 134, 252, 0.1); color: #bb86fc; padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; border: 1px solid #bb86fc; }

        .news-container { background: #161618; border-radius: 12px; padding: 10px; display: flex; align-items: center; margin-bottom: 20px; border: 1px solid #333; overflow: hidden; }
        .news-label { background: #bb86fc; color: #000; padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 0.7rem; flex-shrink: 0; transition: background 0.3s, color 0.3s; }
        .is-offline { background: #cf6679 !important; color: #fff !important; }

        .ticker-wrapper { overflow: hidden; white-space: nowrap; flex-grow: 1; margin-left: 10px; }
        .news-ticker { display: inline-block; animation: scroll 20s linear infinite; font-size: 0.85rem; color: #bb86fc; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .card-section { background: #161618; padding: 20px; border-radius: 24px; border: 1px solid #333; margin-bottom: 25px; }
        .section-title { color: #bb86fc; margin-bottom: 12px; font-weight: 800; }
        .ui-input { width: 100%; padding: 14px; margin-bottom: 10px; background: #000; border: 1px solid #444; color: white; border-radius: 12px; outline: none; transition: border 0.3s; }
        .ui-input:focus { border-color: #bb86fc; }

        .auth-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: 10px; background: #252528; color: #888; border: none; font-weight: 800; cursor: pointer; }
        .tab-btn.active { background: #bb86fc; color: #000; }
        .auth-submit-btn { width: 100%; padding: 16px; border-radius: 16px; font-weight: 800; border: none; cursor: pointer; margin-top: 5px; }
        .login-btn { background: #03dac6; color: #000; }
        .signup-btn { background: #bb86fc; color: #000; }
        
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; position: sticky; top: 10px; z-index: 100; }
        .search-input { background: #252528; border: 2px solid #444; border-radius: 14px; padding: 12px; font-size: 0.9rem; color: #fff; width: 100%; outline: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .town-dropdown { background: #bb86fc; color: #000; border: none; border-radius: 14px; padding: 12px; font-weight: 800; font-size: 0.85rem; outline: none; cursor: pointer; }

        .card { background: #161618; border: 1px solid #252528; border-radius: 28px; padding: 20px; margin-bottom: 20px; position: relative; }
        .status-badge { padding: 8px 16px; border-radius: 12px; font-weight: 800; font-size: 0.8rem; position: absolute; top: 20px; right: 20px; }
        .light-on { background: #03dac6; color: #000; }
        .light-off { background: #cf6679; color: #fff; }
        
        .chips-row { display: flex; gap: 8px; margin: 15px 0; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .chip { background: #252528; padding: 8px 14px; border-radius: 12px; font-size: 0.7rem; color: #eee; border: 1px solid #333; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .chip.active { background: #bb86fc; color: #000; font-weight: 800; border-color: #bb86fc; }

        .follow-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #252528; padding-bottom: 15px; }
        .follow-btn { padding: 8px 14px; border-radius: 10px; font-size: 0.75rem; border: 1px solid #444; cursor: pointer; font-weight: 800; }
        .is-following { background: #bb86fc; color: #000; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .action-btn { padding: 15px; border-radius: 14px; border: 1px solid transparent; font-weight: 800; cursor: pointer; text-align: center; }
        .btn-restored { background: rgba(3, 218, 198, 0.1); color: #03dac6; border-color: #03dac6; }
        .btn-outage { background: rgba(207, 102, 121, 0.1); color: #cf6679; border-color: #cf6679; }
        
        .post-display { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 10px; margin-bottom: 8px; border-left: 3px solid #bb86fc; font-size: 0.85rem; }
        .user-tag { color: #bb86fc; font-weight: 800; font-size: 0.75rem; }
        .post-btn { width: 100%; background: #6200ee; color: white; padding: 16px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; }
        .footer-links { text-align: center; margin-top: 40px; border-top: 1px solid #222; padding: 20px; }
        .contact-link { color: #bb86fc; font-weight: 800; text-decoration: none; margin: 0 15px; }
    </style>
</head>
<body>

    <div id="notif-toast"></div>

    <div class="header-meta">
        <h1 style="font-size: 1.8rem;">Up-Nepa Osun</h1>
        <div id="user-count-ui" class="member-count">0 Members</div>
    </div>

    <div class="news-container">
        <span id="live-indicator" class="news-label">LIVE</span>
        <div class="ticker-wrapper">
            <div class="news-ticker">Select a town and search for your street. Elite members keep the community updated.</div>
        </div>
    </div>

    <div id="auth-box" class="card-section"></div>

    <div class="card-section">
        <h3 class="section-title">📍 Suggest New Street</h3>
        <input type="text" id="sug-name" class="ui-input" placeholder="Street Name">
        <input type="text" id="sug-town" class="ui-input" placeholder="Town">
        <button id="btn-suggest" class="post-btn" style="background:#03dac6; color:#000;" onclick="handleSuggestion(this)">Submit Street</button>
    </div>

    <div class="filter-grid">
        <select id="town-select" class="town-dropdown" onchange="filterStreets()">
            <option value="all">All Towns</option>
        </select>
        <input type="text" id="search-bar" class="search-input" placeholder="🔍 Street Name..." oninput="filterStreets()">
    </div>

    <main id="street-container"></main>

    <footer class="footer-links">
        <a href="https://wa.me/2348062516110" target="_blank" class="contact-link">WhatsApp</a>
        <a href="mailto:aamuda34@gmail.com" class="contact-link">Gmail</a>
    </footer>

    <script>
        // --- SAFE LIVE INDICATOR SCRIPT ---
        function updateConnectivity() {
            const label = document.getElementById('live-indicator');
            if (!label) return;
            if (navigator.onLine) {
                label.innerText = "🟢 LIVE";
                label.classList.remove('is-offline');
            } else {
                label.innerText = "🔴 OFFLINE";
                label.classList.add('is-offline');
            }
        }
        window.addEventListener('online', updateConnectivity);
        window.addEventListener('offline', updateConnectivity);
        updateConnectivity();

        // --- SUPABASE LOGIC ---
        const S_URL = 'https://tzsumiudcqxpyphhjymu.supabase.co';
        const S_KEY = 'sb_publishable_S2TrD434ZYpkkx7gU2wiiw_QrgOr0AV'; 
        const _client = supabase.createClient(S_URL, S_KEY);

        let allStreets = [];
        let followedIds = JSON.parse(localStorage.getItem('my_follows') || '[]');
        let currentUser = null;
        let authMode = 'login';

        function timeAgo(dateString) {
            if (!dateString) return 'No data';
            const seconds = Math.floor((new Date() - new Date(dateString)) / 1000);
            if (seconds < 60) return "Just now";
            const mins = Math.floor(seconds / 60);
            if (mins < 60) return mins + " mins ago";
            return Math.floor(mins / 60) + " hrs ago";
        }

        async function initApp() {
            const { data: { session } } = await _client.auth.getSession();
            currentUser = session?.user || null;
            renderAuthUI();
            updateMemberCount();
            loadApp();
        }

        async function updateMemberCount() {
            const { data, error } = await _client.rpc('get_user_count');
            if (!error) document.getElementById('user-count-ui').innerText = `${data} Members`;
        }

        function switchAuth(mode) {
            authMode = mode;
            renderAuthUI();
        }

        function renderAuthUI(step = 'main') {
            const box = document.getElementById('auth-box');
            if (currentUser) {
                const name = currentUser.user_metadata?.full_name || currentUser.user_metadata?.username || "Elite Member";
                box.innerHTML = `<h3 class="section-title">Welcome, ${name}!</h3><button class="post-btn" style="background:#cf6679;" onclick="_client.auth.signOut().then(()=>location.reload())">Sign Out</button>`;
                return;
            }
            if (step === 'verify') {
                box.innerHTML = `<h3 class="section-title">Verify Code</h3><input type="text" id="verify-code" class="ui-input" placeholder="Enter Gmail Code"><button class="post-btn" onclick="completeVerification(this)">Complete</button>`;
                return;
            }
            const isSignup = authMode === 'signup';
            box.innerHTML = `
                <div class="auth-tabs">
                    <button class="tab-btn ${!isSignup ? 'active' : ''}" onclick="switchAuth('login')">Login</button>
                    <button class="tab-btn ${isSignup ? 'active' : ''}" onclick="switchAuth('signup')">Register</button>
                </div>
                ${isSignup ? '<input type="text" id="auth-name" class="ui-input" placeholder="Full Name">' : ''}
                ${isSignup ? '<input type="text" id="auth-user" class="ui-input" placeholder="Display Username">' : ''}
                <input type="email" id="auth-email" class="ui-input" placeholder="Email Address">
                <input type="password" id="auth-pass" class="ui-input" placeholder="Password">
                <button class="auth-submit-btn ${isSignup ? 'signup-btn' : 'login-btn'}" onclick="handleAuth(this)">${isSignup ? 'Create Account' : 'Sign In'}</button>
            `;
        }

        async function handleAuth(btn) {
            btn.disabled = true; btn.innerText = "Connecting...";
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if (authMode === 'login') {
                const { error } = await _client.auth.signInWithPassword({ email, password: pass });
                if (error) { alert(error.message); btn.disabled = false; btn.innerText = "Sign In"; }
                else location.reload();
            } else {
                const name = document.getElementById('auth-name').value;
                const user = document.getElementById('auth-user').value;
                if(!name || !user) { alert("Include Name & Username"); btn.disabled = false; btn.innerText = "Create Account"; return; }
                window.pendingData = { email, pass, name, user };
                const { error } = await _client.auth.signInWithOtp({ email });
                if (error) { alert(error.message); btn.disabled = false; btn.innerText = "Create Account"; }
                else renderAuthUI('verify');
            }
        }

        async function completeVerification(btn) {
            const token = document.getElementById('verify-code').value;
            const { error } = await _client.auth.verifyOtp({ 
                email: window.pendingData.email, token, type: 'signup',
                options: { data: { full_name: window.pendingData.name, username: window.pendingData.user, banned: false } }
            });
            if (error) alert("Invalid code.");
            else location.reload();
        }

        async function loadApp() {
            const { data, error } = await _client.from('areas').select('*, comments(*)').eq('approved', true).order('name');
            if (!error) { 
                allStreets = data; 
                populateTowns(data);
                filterStreets(); 
            }
        }

        function populateTowns(data) {
            const townSelect = document.getElementById('town-select');
            const towns = [...new Set(data.map(s => s.town))].sort();
            townSelect.innerHTML = '<option value="all">All Towns</option>';
            towns.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t;
                opt.innerText = t;
                townSelect.appendChild(opt);
            });
        }

        function filterStreets() {
            const selectedTown = document.getElementById('town-select').value;
            const streetQuery = document.getElementById('search-bar').value.toLowerCase();
            const filtered = allStreets.filter(s => {
                const matchesTown = selectedTown === 'all' || s.town === selectedTown;
                const matchesStreet = s.name.toLowerCase().includes(streetQuery);
                return matchesTown && matchesStreet;
            });
            renderStreets(filtered);
        }

        function renderStreets(data) {
            const container = document.getElementById('street-container');
            if (data.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:20px; color:#555;">No streets found.</div>`;
                return;
            }
            container.innerHTML = data.map(s => {
                const isFollowing = followedIds.includes(s.id);
                return `
                <div class="card">
                    <span class="status-badge ${s.status === 'Light On' ? 'light-on' : 'light-off'}">${s.status || 'No Light'}</span>
                    <h2 style="font-size:1.6rem; font-weight:800;">${s.name}</h2>
                    <p style="color:#666; font-size:0.75rem;">📍 ${s.town} • <span style="color:#bb86fc;">🕒 ${timeAgo(s.last_updated)}</span></p>
                    
                    <div class="chips-row">
                        <div class="chip" onclick="applyChip(this, ${s.id}, '⛈️ Weather Issue')">⛈️ Weather Issue</div>
                        <div class="chip" onclick="applyChip(this, ${s.id}, '⚡ Low Voltage')">⚡ Low Voltage</div>
                        <div class="chip" onclick="applyChip(this, ${s.id}, '🔌 Phase Issue')">🔌 Phase Issue</div>
                        <div class="chip" onclick="applyChip(this, ${s.id}, '🛠️ Maintenance')">🛠️ Maintenance</div>
                    </div>

                    <div class="follow-container">
                        <div class="follow-btn ${isFollowing ? 'is-following' : ''}" onclick="toggleFollow(${s.id})">${isFollowing ? '⭐ FOLLOWING' : '☆ FOLLOW'}</div>
                        <div class="follower-count">👥 ${s.confirmations || 0} Followers</div>
                    </div>

                    <div class="btn-grid">
                        <button class="action-btn btn-restored" onclick="updateStatus(${s.id}, 'Light On', 'on_count', '${s.status}', this)">🟢 Restored</button>
                        <button class="action-btn btn-outage" onclick="updateStatus(${s.id}, 'No Light', 'off_count', '${s.status}', this)">🔴 Outage</button>
                    </div>

                    <div id="posts-${s.id}">
                        ${(s.comments || []).slice(-3).reverse().map(c => `<div class="post-display"><span class="user-tag">${c.username}</span> • ${timeAgo(c.created_at)}<br>${c.content}</div>`).join('')}
                    </div>

                    <textarea id="cmt-${s.id}" class="ui-input" style="height:60px; margin-top:10px;" placeholder="Add detail..." maxlength="150"></textarea>
                    <button class="post-btn" onclick="addComment(${s.id}, this)">Post Update</button>
                </div>
                `;
            }).join('');
        }

        // --- UPDATED: Secure Apply Chip Function ---
        function applyChip(btn, id, text) {
            // Check if user is logged in
            if (!currentUser) {
                return alert("🔒 Log in to select an issue.");
            }

            const input = document.getElementById(`cmt-${id}`);
            if(input) {
                input.value = text;
                // Visual update for the chip
                const row = btn.parentElement;
                const chips = row.querySelectorAll('.chip');
                chips.forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
            }
        }

        async function updateStatus(id, status, col, current, btn) {
            if (!currentUser) return alert("🔒 Log in to update status.");
            if (status === current) return;
            btn.disabled = true;
            await _client.from('areas').update({ status: status, last_updated: new Date().toISOString() }).eq('id', id);
            await _client.rpc('increment_count', { row_id: id, col_name: col });
            loadApp();
        }

        async function addComment(id, btn) {
            if (!currentUser) return alert("🔒 Log in to post.");
            const val = document.getElementById(`cmt-${id}`).value;
            if(!val) return;
            btn.disabled = true;
            await _client.from('comments').insert([{ area_id: id, content: val, username: currentUser.user_metadata.username }]);
            loadApp();
        }

        async function toggleFollow(id) {
            if (!currentUser) return alert("🔒 Log in to follow.");
            const isFollowing = followedIds.includes(id);
            if (isFollowing) {
                followedIds = followedIds.filter(i => i !== id);
                await _client.rpc('toggle_follow', { row_id: id, is_following: false });
            } else {
                followedIds.push(id);
                await _client.rpc('toggle_follow', { row_id: id, is_following: true });
            }
            localStorage.setItem('my_follows', JSON.stringify(followedIds));
            loadApp();
        }

        async function handleSuggestion(btn) {
            if (!currentUser) return alert("🔒 Log in to suggest.");
            const name = document.getElementById('sug-name').value;
            const town = document.getElementById('sug-town').value;
            if(!name || !town) return;
            btn.disabled = true;
            await _client.from('areas').insert([{ name, town, approved: false }]);
            alert("Suggested!");
            btn.disabled = false;
        }

        initApp();
    </script>
</body>
    </html>
