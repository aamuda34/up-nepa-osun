<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Up-Nepa Osun Elite</title>
    <meta name="description" content="Elite real-time electricity tracking for Osun.">
    
    <link rel="manifest" href="manifest.json?v=1.3">
    <link rel="icon" type="image/png" href="icon.png?v=1.3">
    <link rel="apple-touch-icon" href="icon.png?v=1.3">
    
    <meta name="apple-mobile-web-app-title" content="Up-Nepa Elite">
    <meta name="application-name" content="Up-Nepa Osun Elite">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0b">

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #bb86fc;
            --success: #03dac6;
            --danger: #cf6679;
            --bg: #0a0a0b;
            --card: #161618;
            --text-dim: #888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fdfdfd; padding: 16px; padding-bottom: 80px; }
        
        .app-header { margin-bottom: 20px; border-bottom: 1px solid #252528; padding-bottom: 15px; }
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .brand-tag { color: var(--primary); font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
        .brand-name { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; }
        
        .member-count { background: rgba(187, 134, 252, 0.1); color: var(--primary); padding: 6px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 800; border: 1px solid var(--primary); }
        
        .connection-status { font-size: 0.7rem; font-weight: 700; display: flex; align-items: center; gap: 6px; margin-top: 8px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; transition: 0.3s; }
        .dot-online { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .dot-offline { background: var(--danger); }

        .news-container { background: var(--card); border-radius: 14px; padding: 10px; display: flex; align-items: center; margin-bottom: 20px; border: 1px solid #333; overflow: hidden; }
        .news-label { background: var(--success); color: #000; padding: 4px 8px; border-radius: 6px; font-weight: 800; font-size: 0.65rem; flex-shrink: 0; }
        .ticker-wrapper { overflow: hidden; white-space: nowrap; flex-grow: 1; margin-left: 10px; }
        .news-ticker { display: inline-block; animation: scroll 20s linear infinite; font-size: 0.8rem; color: var(--primary); font-weight: 600; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .google-btn { width: 100%; padding: 16px; border-radius: 16px; background: #fff; color: #000; font-weight: 800; border: none; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; cursor: pointer; }
        .google-btn img { width: 20px; }
        .card-section { background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid #333; margin-bottom: 25px; }
        .ui-input { width: 100%; padding: 14px; margin-bottom: 10px; background: #000; border: 1px solid #444; color: white; border-radius: 12px; outline: none; }

        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; position: sticky; top: 10px; z-index: 100; }
        .search-input { background: #252528; border: 2px solid #444; border-radius: 14px; padding: 12px; font-size: 0.9rem; color: #fff; width: 100%; outline: none; }
        .town-dropdown { background: var(--primary); color: #000; border: none; border-radius: 14px; padding: 12px; font-weight: 800; outline: none; }

        .card { background: var(--card); border: 1px solid #252528; border-radius: 28px; padding: 20px; margin-bottom: 20px; position: relative; }
        .status-badge { padding: 8px 16px; border-radius: 12px; font-weight: 800; font-size: 0.8rem; position: absolute; top: 20px; right: 20px; text-transform: uppercase; }
        
        .follow-btn { position: absolute; top: 60px; right: 25px; background: transparent; border: none; color: var(--text-dim); cursor: pointer; }
        .follow-btn.active { color: var(--primary); }

        .light-on { background: var(--success); color: #000; }
        .light-off { background: var(--danger); color: #fff; }
        
        .chips-row { display: flex; gap: 8px; margin: 15px 0; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .chip { background: #252528; padding: 8px 14px; border-radius: 12px; font-size: 0.7rem; color: #eee; border: 1px solid #333; cursor: pointer; white-space: nowrap; }
        .chip.active { background: var(--primary); color: #000; font-weight: 800; }

        .lucide { width: 16px; height: 16px; vertical-align: middle; margin-right: 4px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .action-btn { padding: 15px; border-radius: 14px; border: 1px solid transparent; font-weight: 800; cursor: pointer; text-align: center; transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .action-btn:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }
        .btn-restored { background: rgba(3, 218, 198, 0.1); color: var(--success); border-color: var(--success); }
        .btn-outage { background: rgba(207, 102, 121, 0.1); color: var(--danger); border-color: var(--danger); }
        .counter-text { display: block; font-size: 0.65rem; margin-top: 4px; opacity: 0.8; font-weight: 400; }

        .post-display { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 10px; margin-bottom: 8px; border-left: 3px solid var(--primary); font-size: 0.85rem; }
        .user-tag { color: var(--primary); font-weight: 800; font-size: 0.75rem; }
        .post-btn { width: 100%; background: #6200ee; color: white; padding: 16px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; }

        footer { text-align: center; margin-top: 40px; padding: 20px; border-top: 1px solid #222; }
        .support-link { color: var(--primary); font-weight: 800; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="header-top">
            <div>
                <p class="brand-tag">Elite Edition</p>
                <h1 class="brand-name">Up-Nepa <span style="color:var(--primary)">Osun</span></h1>
                <div id="conn-ui" class="connection-status">
                    <span class="dot dot-offline"></span> Offline
                </div>
            </div>
            <div id="user-count-ui" class="member-count">0 MEMBERS</div>
        </div>
    </header>

    <div class="news-container">
        <span class="news-label">ELITE</span>
        <div class="ticker-wrapper">
            <div class="news-ticker">Welcome to the Elite community. Real-time updates for Adeeke, Aiba, and more. Follow your street for alerts!</div>
        </div>
    </div>

    <div id="auth-box" class="card-section">
        <button class="google-btn" onclick="loginGoogle()">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png">
            Continue with Google
        </button>
    </div>

    <div class="filter-grid">
        <select id="town-select" class="town-dropdown" onchange="filterStreets()"><option value="all">All Towns</option></select>
        <input type="text" id="search-bar" class="search-input" placeholder="🔍 Find Street..." oninput="filterStreets()">
    </div>

    <main id="street-container"></main>

    <footer class="footer-support">
        <a href="https://wa.me/2348062516110" target="_blank" class="support-link">WhatsApp Support</a>
    </footer>

    <script>
        const S_URL = 'https://tzsumiudcqxpyphhjymu.supabase.co';
        const S_KEY = 'sb_publishable_S2TrD434ZYpkkx7gU2wiiw_QrgOr0AV'; 
        const _client = supabase.createClient(S_URL, S_KEY);

        let allStreets = [];
        let currentUser = null;
        let followedStreets = JSON.parse(localStorage.getItem('followed_streets') || '[]');

        function timeAgo(dateString) {
            if (!dateString) return 'No data';
            const seconds = Math.floor((new Date() - new Date(dateString)) / 1000);
            if (seconds < 60) return "Just now";
            const mins = Math.floor(seconds / 60);
            if (mins < 60) return mins + "m ago";
            return Math.floor(mins / 60) + "h ago";
        }

        async function initApp() {
            const { data: { session } } = await _client.auth.getSession();
            currentUser = session?.user || null;
            
            if (currentUser) {
                updateAuthUI();
                await syncUserRecord();
                if (Notification.permission === 'default') {
                    Notification.requestPermission();
                }
            }
            
            loadData();
            subscribeToUpdates();
            updateMemberCount();
        }

        async function loginGoogle() {
            const { error } = await _client.auth.signInWithOAuth({ 
                provider: 'google',
                options: { redirectTo: window.location.origin }
            });
            if (error) alert(error.message);
        }

        async function syncUserRecord() {
            const { data } = await _client.from('members').select('id').eq('email', currentUser.email).single();
            if (!data) {
                await _client.from('members').insert([{ email: currentUser.email }]);
            }
        }

        async function updateMemberCount() {
            const { count } = await _client.from('members').select('*', { count: 'exact', head: true });
            document.getElementById('user-count-ui').innerText = `${count || 0} Members`;
        }

        function updateAuthUI() {
            document.getElementById('auth-box').innerHTML = `
                <p style="text-align:center; color:#bb86fc; font-weight:800; margin-bottom:10px;">Elite Account: ${currentUser.email.split('@')[0]}</p>
                <button class="post-btn" style="background:#cf6679; padding:10px;" onclick="_client.auth.signOut().then(()=>location.reload())">Sign Out</button>
            `;
        }

        async function loadData() {
            const { data, error } = await _client.from('areas').select('*, comments(*)').eq('approved', true).order('name');
            if (!error) { 
                allStreets = data; 
                populateTowns(data);
                filterStreets(); 
            }
        }

        function populateTowns(data) {
            const townSelect = document.getElementById('town-select');
            const towns = [...new Set(data.map(s => s.town))].sort();
            townSelect.innerHTML = '<option value="all">All Towns</option>';
            towns.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t; opt.innerText = t;
                townSelect.appendChild(opt);
            });
        }

        function filterStreets() {
            const town = document.getElementById('town-select').value;
            const query = document.getElementById('search-bar').value.toLowerCase();
            const filtered = allStreets.filter(s => (town === 'all' || s.town === town) && s.name.toLowerCase().includes(query));
            renderStreets(filtered);
        }

        function renderStreets(data) {
            const container = document.getElementById('street-container');
            container.innerHTML = data.map(s => {
                const comments = (s.comments || []).slice(-2).reverse();
                const isLightOn = s.status === 'Light On';
                const isFollowed = followedStreets.includes(s.id);
                
                return `
                <div class="card">
                    <span class="status-badge ${isLightOn ? 'light-on' : 'light-off'}">${s.status || 'No Light'}</span>
                    
                    <button class="follow-btn ${isFollowed ? 'active' : ''}" onclick="toggleFollow(${s.id}, this)">
                        <i data-lucide="${isFollowed ? 'bell-ring' : 'bell'}"></i>
                    </button>

                    <h2 style="font-size:1.6rem; font-weight:800;">${s.name}</h2>
                    <p style="color:var(--text-dim); font-size:0.75rem; margin-top:4px;">
                        <i data-lucide="map-pin"></i> ${s.town} • <span style="color:var(--primary);">🕒 ${timeAgo(s.last_updated)}</span>
                    </p>
                    
                    <div class="chips-row">
                        <div class="chip" onclick="applyChip(this, ${s.id}, '⛈️ Weather Issue')">⛈️ Weather</div>
                        <div class="chip" onclick="applyChip(this, ${s.id}, '⚡ Low Voltage')">⚡ Low Voltage</div>
                        <div class="chip" onclick="applyChip(this, ${s.id}, '🛠️ Maintenance')">🛠️ Maintenance</div>
                    </div>

                    <div class="btn-grid">
                        <button class="action-btn btn-restored" ${isLightOn ? 'disabled' : ''} onclick="updateStatus(${s.id}, 'Light On', 'on_count')">
                            <div><i data-lucide="sun"></i> Restored</div>
                            <span class="counter-text">Total: ${s.on_count || 0}</span>
                        </button>
                        <button class="action-btn btn-outage" ${!isLightOn ? 'disabled' : ''} onclick="updateStatus(${s.id}, 'No Light', 'off_count')">
                            <div><i data-lucide="moon"></i> Outage</div>
                            <span class="counter-text">Total: ${s.off_count || 0}</span>
                        </button>
                    </div>

                    <div id="posts-${s.id}">
                        ${comments.map(c => `<div class="post-display"><span class="user-tag">${c.username || 'Elite'}</span> • ${timeAgo(c.created_at)}<br>${c.content}</div>`).join('')}
                    </div>

                    <textarea id="cmt-${s.id}" class="ui-input" style="height:60px; margin-top:10px;" placeholder="Add detail..." maxlength="100"></textarea>
                    <button class="post-btn" onclick="addComment(${s.id}, this)">Post Update</button>
                </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function toggleFollow(id, btn) {
            if (!currentUser) return alert("🔒 Login required to follow streets.");
            if (followedStreets.includes(id)) {
                followedStreets = followedStreets.filter(sid => sid !== id);
                btn.classList.remove('active');
            } else {
                followedStreets.push(id);
                btn.classList.add('active');
                if (Notification.permission !== 'granted') Notification.requestPermission();
            }
            localStorage.setItem('followed_streets', JSON.stringify(followedStreets));
            renderStreets(allStreets);
        }

        function triggerNotification(streetName, status) {
            if (Notification.permission === 'granted') {
                new Notification("Up-Nepa Elite Alert", {
                    body: `Status Update for ${streetName}: ${status}`,
                    icon: "icon.png" // FIXED: Removed leading slash here
                });
            }
        }

        function applyChip(btn, id, text) {
            if (!currentUser) return alert("🔒 Login required.");
            document.getElementById(`cmt-${id}`).value = text;
            btn.parentElement.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
        }

        async function updateStatus(id, status, col) {
            if (!currentUser) return alert("🔒 Login required.");
            await _client.from('areas').update({ status, last_updated: new Date().toISOString() }).eq('id', id);
            await _client.rpc('increment_count', { row_id: id, col_name: col });
            loadData();
        }

        async function addComment(id, btn) {
            if (!currentUser) return alert("🔒 Login required.");
            const val = document.getElementById(`cmt-${id}`).value;
            if(!val) return;
            btn.disabled = true;
            await _client.from('comments').insert([{ area_id: id, content: val, username: currentUser.email.split('@')[0] }]);
            loadData();
        }

        function subscribeToUpdates() {
            const channel = _client.channel('db-changes')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'areas' }, (payload) => {
                    const updated = payload.new;
                    if (followedStreets.includes(updated.id) && payload.old.status !== updated.status) {
                        triggerNotification(updated.name, updated.status);
                    }
                    loadData();
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'members' }, () => updateMemberCount())
                .subscribe((status) => {
                    const icon = document.getElementById('conn-ui');
                    if (status === 'SUBSCRIBED') {
                        icon.innerHTML = '<span class="dot dot-online"></span> Live';
                    } else {
                        icon.innerHTML = '<span class="dot dot-offline"></span> Reconnecting...';
                    }
                });
        }

        initApp();
    </script>
</body>
                </html>
